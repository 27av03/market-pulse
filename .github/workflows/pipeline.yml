name: Market Pulse Pipeline

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 22 * * 1-5'  # 6 PM EST (22:00 UTC), weekdays only

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up dbt profile
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          transforms:
            outputs:
              dev:
                type: duckdb
                path: /home/runner/work/market-pulse/market-pulse/data/market_pulse.db
                threads: 1
            target: dev
          EOF

      - name: Run pipeline
        run: python pipeline/flow.py
